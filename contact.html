<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>
    <header class="header">  
    <div class="navbar">
      <div class="logo">Formulario de Contacto</div>
    </div>
    </header>

    <main>
        <section>
            <form action="#" method="post">

                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Ej. Juan Pérez">

                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">

                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="telefono" required 
                       pattern="[0-9]{3}-[0-9]{7}" 
                       placeholder="Ej. 387-1234567">

                <label for="mensaje">Mensaje *</label>
                <textarea id="mensaje" name="mensaje" required minlength="10" 
                          placeholder="Escribe tu mensaje aquí..."></textarea>

                <label for="motivo">Motivo de contacto *</label>
                <select id="motivo" name="motivo" required>
                    <option value="">Seleccione una opción</option>
                    <option value="consulta">Consulta</option>
                    <option value="soporte">Soporte Técnico</option>
                    <option value="otros">Otros</option>
                </select>

                <div>
                    <input type="checkbox" id="terminos" name="terminos" required >
                    <label for="terminos" class="terminos">Acepto los términos y condiciones</label>
                </div>


                <button type="submit">Enviar</button>

                <p><br>* Campos obligatorios</p>
            </form>
        </section>
    </main>

      <footer class="footer">
    <p>© 2026 Victor Colón</p>
    <div class="social-links">
      <a href="https://ar.linkedin.com/" target="_blank">LinkedIn</a>
      <a href="https://github.com/VCR-Code" target="_blank">Github</a>
      <a href="https://www.instagram.com/?hl=es" target="_blank">Instagram</a>
    </div>
  </footer>
</body>
</html>
