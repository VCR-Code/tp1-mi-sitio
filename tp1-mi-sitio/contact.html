<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Formulario de Contacto</h1>
    </header>

    <main>
        <section>
            <form action="#" method="post">

                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Ej. Juan Pérez">

                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">

                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="telefono" required 
                       pattern="[0-9]{2,4}-[0-9]{6,8}" 
                       placeholder="Ej. 387-1234567">

                <label for="mensaje">Mensaje *</label>
                <textarea id="mensaje" name="mensaje" required minlength="10" 
                          placeholder="Escribe tu mensaje aquí..."></textarea>

                <label for="motivo">Motivo de contacto *</label>
                <select id="motivo" name="motivo" required>
                    <option value="">Seleccione una opción</option>
                    <option value="consulta">Consulta</option>
                    <option value="soporte">Soporte Técnico</option>
                    <option value="otros">Otros</option>
                </select>

                <div>
                    <input type="checkbox" id="terminos" name="terminos" required>
                    <label for="terminos">Acepto los términos y condiciones *</label>
                </div>


                <button type="submit">Enviar</button>

                <p><br>* Campos requeridos</p>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Victor Colón</p>
    </footer>
</body>
</html>
